# Alembic configuration — raw SQL migrations (no SQLAlchemy ORM)
#
# Usage:
#   cd api
#   alembic upgrade head          # Apply all pending migrations
#   alembic current               # Show current revision
#   alembic revision -m "desc"    # Create new migration
#   alembic downgrade -1          # Roll back one step

[alembic]
script_location = alembic
prepend_sys_path = .

# Connection URL is set dynamically in env.py from DATABASE_URL
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
