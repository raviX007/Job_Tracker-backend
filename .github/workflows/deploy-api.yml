name: Deploy Job Tracker API

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'core/**'
      - 'db/**'
      - 'tests/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - 'Dockerfile'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: job-tracker-api

jobs:
  # ─── PHASE 1: TEST ────────────────────────────────
  test:
    name: Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - run: pip install -r requirements-dev.txt
      # - name: Lint
      #   run: ruff check api/ tests/

  # ─── PHASE 2: BUILD + PUSH TO ECR ─────────────────
  build:
    name: Build → ECR
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        id: build
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          docker build -t $IMAGE .
          docker tag $IMAGE ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Push to ECR
        run: |
          docker push ${{ steps.build.outputs.image }}
          docker push ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

  # ─── PHASE 3: DEPLOY TO EC2 ───────────────────────
  deploy:
    name: Deploy → EC2
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR
            aws ecr get-login-password --region ap-south-1 | \
              docker login --username AWS --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com

            # Pull latest secrets
            aws secretsmanager get-secret-value \
              --secret-id job-tracker/api \
              --region ap-south-1 \
              --query SecretString \
              --output text | python3 -c "
            import json, sys
            for k, v in json.load(sys.stdin).items():
                print(f'{k}={v}')
            " > /home/ec2-user/apps/job-tracker-api.env

            # Stop and remove old container
            docker stop job-tracker-api || true
            docker rm job-tracker-api || true

            # Pull and run new container
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/job-tracker-api:latest

            docker run -d \
              --name job-tracker-api \
              --restart unless-stopped \
              -p 8008:8008 \
              --env-file /home/ec2-user/apps/job-tracker-api.env \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/job-tracker-api:latest

            docker image prune -f
            echo "Job Tracker API deployed: ${{ github.sha }}"